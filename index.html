<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cate • 30</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --desert-orange: #F4602A;
      --desert-pink: #F0437A;
      --desert-purple: #7B3FA0;
      --desert-gold: #F5C842;
      --desert-sky: #1A0A2E;
      --desert-dusk: #2D1B4E;
      --sand: #F7E4C8;
      --white: #FFF9F0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--desert-sky);
      min-height: 100vh;
      overflow-x: hidden;
      font-family: 'Space Mono', monospace;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      width: 12px; height: 12px;
      background: var(--desert-gold);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
      mix-blend-mode: difference;
    }

    /* Stars */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to { opacity: 1; transform: scale(1.4); }
    }

    /* Sunset gradient background */
    .bg-gradient {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 60vh;
      background: linear-gradient(
        to top,
        #F4602A 0%,
        #F0437A 25%,
        #7B3FA0 55%,
        transparent 100%
      );
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* Palm silhouettes */
    .palms {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 280px;
      pointer-events: none;
      z-index: 1;
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 320px;
      text-align: center;
    }

    /* Festival badge */
    .badge {
      display: inline-block;
      border: 1px solid rgba(245, 200, 66, 0.5);
      color: var(--desert-gold);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 2px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    /* Main title */
    .title-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .title-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(100px, 22vw, 200px);
      line-height: 0.85;
      letter-spacing: -2px;
      background: linear-gradient(135deg, var(--desert-gold) 0%, var(--desert-orange) 40%, var(--desert-pink) 70%, #C060E0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 1s ease 0.5s forwards;
      display: block;
    }

    .title-sub {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(60px, 14vw, 130px);
      letter-spacing: 8px;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 1s ease 0.7s forwards;
      display: block;
      margin-top: -10px;
    }

    /* Thirty */
    .thirty {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(20px, 5vw, 36px);
      color: var(--desert-gold);
      letter-spacing: 6px;
      margin: 16px 0 48px;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    /* Divider */
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--desert-gold), transparent);
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }

    /* Player */
    .player-wrap {
      opacity: 0;
      animation: fadeUp 1s ease 1.3s forwards;
      margin-bottom: 48px;
    }

    .player-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--desert-gold);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.7;
    }

    .player {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(245, 200, 66, 0.2);
      border-radius: 4px;
      padding: 24px 32px;
      backdrop-filter: blur(10px);
      min-width: 320px;
      max-width: 480px;
    }

    .song-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--white);
      margin-bottom: 4px;
    }

    .song-artist {
      font-size: 11px;
      color: rgba(247, 228, 200, 0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* Waveform animation */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 40px;
      margin-bottom: 24px;
    }
    .wave-bar {
      width: 3px;
      background: linear-gradient(to top, var(--desert-orange), var(--desert-pink));
      border-radius: 2px;
      animation: wave var(--spd) ease-in-out infinite alternate;
      opacity: 0.4;
    }
    .wave-bar.playing {
      opacity: 1;
    }
    @keyframes wave {
      from { height: 4px; }
      to { height: var(--h); }
    }

    /* Play button */
    .play-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--desert-orange), var(--desert-pink));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 30px rgba(240, 67, 122, 0.4);
    }
    .play-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 50px rgba(240, 67, 122, 0.7);
    }
    .play-btn svg {
      fill: white;
      margin-left: 3px;
    }

    /* Audio element */
    audio { display: none; }

    /* Progress */
    .progress-wrap {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(to right, var(--desert-orange), var(--desert-pink));
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }
    .time {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: rgba(247,228,200,0.4);
      letter-spacing: 2px;
    }

    /* Placeholder message */
    .placeholder-msg {
      font-size: 11px;
      color: rgba(245, 200, 66, 0.5);
      letter-spacing: 2px;
      margin-top: 12px;
    }

    /* Message */
    .message {
      max-width: 500px;
      opacity: 0;
      animation: fadeUp 1s ease 1.5s forwards;
    }
    .message p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(16px, 3vw, 20px);
      color: rgba(247, 228, 200, 0.8);
      line-height: 1.8;
    }
    .message .signature {
      font-family: 'Space Mono', monospace;
      font-style: normal;
      font-size: 12px;
      letter-spacing: 4px;
      color: var(--desert-gold);
      margin-top: 20px;
      display: block;
      text-transform: uppercase;
    }

    /* Floating elements */
    .floating {
      position: fixed;
      pointer-events: none;
      z-index: 2;
      animation: float var(--dur) ease-in-out infinite alternate;
    }
    @keyframes float {
      from { transform: translateY(0px) rotate(0deg); }
      to { transform: translateY(-20px) rotate(5deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Sunset gradient -->
<div class="bg-gradient"></div>

<!-- Palm silhouettes SVG -->
<svg class="palms" viewBox="0 0 1440 280" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
  <!-- Left palm -->
  <g fill="#0D0620" opacity="0.95">
    <rect x="80" y="180" width="14" height="100"/>
    <ellipse cx="87" cy="185" rx="60" ry="18" transform="rotate(-30 87 185)"/>
    <ellipse cx="87" cy="185" rx="55" ry="16" transform="rotate(20 87 185)"/>
    <ellipse cx="87" cy="185" rx="50" ry="15" transform="rotate(-60 87 185)"/>
    <ellipse cx="87" cy="185" rx="48" ry="14" transform="rotate(50 87 185)"/>
    <ellipse cx="87" cy="185" rx="52" ry="14" transform="rotate(80 87 185)"/>
  </g>
  <!-- Left small palm -->
  <g fill="#0D0620" opacity="0.9">
    <rect x="180" y="210" width="10" height="70"/>
    <ellipse cx="185" cy="215" rx="42" ry="13" transform="rotate(-25 185 215)"/>
    <ellipse cx="185" cy="215" rx="38" ry="12" transform="rotate(25 185 215)"/>
    <ellipse cx="185" cy="215" rx="36" ry="11" transform="rotate(-55 185 215)"/>
    <ellipse cx="185" cy="215" rx="34" ry="11" transform="rotate(60 185 215)"/>
  </g>
  <!-- Right palm -->
  <g fill="#0D0620" opacity="0.95">
    <rect x="1346" y="170" width="14" height="110"/>
    <ellipse cx="1353" cy="175" rx="62" ry="18" transform="rotate(30 1353 175)"/>
    <ellipse cx="1353" cy="175" rx="56" ry="16" transform="rotate(-20 1353 175)"/>
    <ellipse cx="1353" cy="175" rx="52" ry="15" transform="rotate(60 1353 175)"/>
    <ellipse cx="1353" cy="175" rx="50" ry="14" transform="rotate(-50 1353 175)"/>
    <ellipse cx="1353" cy="175" rx="54" ry="14" transform="rotate(-80 1353 175)"/>
  </g>
  <!-- Right small palm -->
  <g fill="#0D0620" opacity="0.9">
    <rect x="1260" y="205" width="10" height="75"/>
    <ellipse cx="1265" cy="210" rx="44" ry="13" transform="rotate(25 1265 210)"/>
    <ellipse cx="1265" cy="210" rx="40" ry="12" transform="rotate(-25 1265 210)"/>
    <ellipse cx="1265" cy="210" rx="37" ry="11" transform="rotate(55 1265 210)"/>
    <ellipse cx="1265" cy="210" rx="35" ry="11" transform="rotate(-60 1265 210)"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="260" width="1440" height="20" fill="#0D0620"/>
</svg>

<!-- Main content -->
<div class="container">
  <div class="badge">✦ Porto San Giorgio • 2026 ✦</div>

  <div class="title-wrap">
    <span class="title-main">CATE</span>
    <span class="title-sub">compie 30</span>
  </div>

  <div class="thirty">trent'anni di terremoto</div>
  <div class="divider"></div>

  <div class="player-wrap">
    <div class="player-label">✦ la tua canzone ✦</div>
    <div class="player">
      <div class="song-title">Turni da Ventiquattro</div>
      <div class="song-artist">Claudio & Baloo • 2026</div>

      <div class="waveform" id="waveform"></div>

      <button class="play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <audio id="audio" src="https://suno.com/s/9dd3oPnoDTWr0zRE"></audio>

      <div class="progress-wrap" onclick="seek(event)">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">3:09</span>
      </div>
    </div>
  </div>

  <div class="message">
    <p>Sei il terremoto più dolce che conosca.<br>Ti amo oggi, domani e per altri cento anni.</p>
    <span class="signature">— Claudio & Baloo 🐾</span>
  </div>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // Stars
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 70}%;
      width: ${size}px;
      height: ${size}px;
      --dur: ${Math.random() * 3 + 2}s;
      animation-delay: ${Math.random() * 4}s;
    `;
    starsContainer.appendChild(star);
  }

  // Waveform
  const waveform = document.getElementById('waveform');
  const heights = [8,14,22,30,36,28,18,40,32,24,16,38,26,20,34,12,28,40,22,16,32,24,36,18,30,40,14,26,20,38];
  heights.forEach((h, i) => {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.cssText = `--h: ${h}px; --spd: ${0.4 + Math.random() * 0.6}s; animation-delay: ${i * 0.05}s;`;
    waveform.appendChild(bar);
  });

  // Audio player
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const progressBar = document.getElementById('progressBar');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  let playing = false;

  function togglePlay() {
    if (audio.src.includes('INSERISCI')) {
      // No audio yet — animate anyway for demo
      playing = !playing;
      updatePlayState();
      return;
    }
    if (playing) {
      audio.pause();
    } else {
      audio.play();
    }
    playing = !playing;
    updatePlayState();
  }

  function updatePlayState() {
    const bars = document.querySelectorAll('.wave-bar');
    if (playing) {
      playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      bars.forEach(b => b.classList.add('playing'));
    } else {
      playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      bars.forEach(b => b.classList.remove('playing'));
    }
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
      durationEl.textContent = formatTime(audio.duration);
    }
  });

  audio.addEventListener('ended', () => {
    playing = false;
    updatePlayState();
    progressBar.style.width = '0%';
  });

  function seek(e) {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * audio.duration;
  }
</script>
</body>
</html>
